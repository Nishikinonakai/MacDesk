name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # tag 推送时创建 Release 用
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained win-x64
        run: dotnet publish -c Release -r win-x64 --self-contained true -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacDesk-win-x64
          path: publish/

      - name: Zip for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: Compress-Archive -Path publish/* -DestinationPath "MacDesk-${{ github.ref_name }}-win-x64.zip"

      - name: Build installer
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $ver = '${{ github.ref_name }}'.TrimStart('v')
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { choco install innosetup -y --no-progress }
          & $iscc /DMyAppVersion=$ver /DSourceDir="$PWD\publish" installer\macdesk.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MacDesk-Setup-*.exe
            MacDesk-*.zip
          generate_release_notes: true
